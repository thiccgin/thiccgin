    <tspan x="30" y="185">- Contact</tspan> -———————————————————————————————————————————————————————————
    <tspan x="30" y="210" class="cc">. </tspan><tspan class="key">Email</tspan>:<tspan class="cc"> ...................................... </tspan><tspan class="value">you@example.com</tspan>
    <tspan x="30" y="230" class="cc">. </tspan><tspan class="key">LinkedIn</tspan>:<tspan class="cc"> ................................... </tspan><tspan class="value">linkedin.com/in/you</tspan>
    <tspan x="30" y="250" class="cc">. </tspan><tspan class="key">Website</tspan>:<tspan class="cc"> .................................... </tspan><tspan class="value">yourdomain.com</tspan>

