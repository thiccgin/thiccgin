    <tspan x="30" y="410" class="cc">. </tspan><tspan class="key">NeetCode</tspan>:<tspan class="cc"> ............................. </tspan><tspan class="value">leetcode repo link</tspan>
    <tspan x="30" y="430" class="cc">. </tspan><tspan class="key">Coursework</tspan>:<tspan class="cc"> ........................... </tspan><tspan class="value">csun-coursework repo link</tspan>
